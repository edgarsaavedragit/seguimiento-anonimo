# NOMBRE DE LA APP
spring.application.name=seguimiento-anonimo

# CONEXIÓN A BASE DE DATOS (MySQL)
# Asegúrate de que el puerto sea 3306 (el estándar)
spring.datasource.url=jdbc:mysql://localhost:3306/psicologia_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=Edgar
spring.datasource.password=Edgar171717.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# CONFIGURACIÓN DE JPA (Hibernate)
# 'update' creará las tablas automáticamente cuando definamos las entidades
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect