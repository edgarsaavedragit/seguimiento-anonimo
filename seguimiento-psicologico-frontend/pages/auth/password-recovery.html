<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña</title>
    <link rel="stylesheet" href="../../css/styles.css">
    <link rel="stylesheet" href="../../css/auth-styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <div class="auth-logo">🔐</div>
                <h2>Recuperar Contraseña</h2>
                <p>Ingresa tu email para recibir el enlace de recuperación</p>
            </div>
            
            <form id="recoveryForm">
                <div class="form-group">
                    <label for="recoveryEmail">Email registrado</label>
                    <input type="email" id="recoveryEmail" class="form-control" 
                           placeholder="ejemplo@psicologia.com" required>
                </div>
                
                <div id="recoveryMessage" class="message"></div>
                
                <button type="submit" class="btn btn-primary auth-btn">Enviar enlace</button>
                
                <div class="auth-links">
                    <a href="login.html">← Volver al login</a>
                </div>
            </form>
        </div>
    </div>
    
    <script src="../../js/password-recovery.js"></script>
</body>
</html>
