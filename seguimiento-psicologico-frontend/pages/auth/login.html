<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Panel Psicóloga</title>
    <link rel="stylesheet" href="../../css/styles.css">
    <link rel="stylesheet" href="../../css/auth-styles.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <div class="auth-logo"></div>
                <h2>Panel de Psicología</h2>
                <p>Ingresa tus credenciales para acceder</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" class="form-control" placeholder="Ingresa tu usuario" required>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" class="form-control" placeholder="Ingresa tu contraseña"
                        required>
                </div>

                <button type="submit" class="btn btn-primary auth-btn">Ingresar</button>

                <div class="auth-links">
                    <a href="../../index.html">← Volver al inicio</a>
                    <br>
                    <a href="password-recovery.html" class="forgot-password">
                        ¿Olvidaste tu contraseña?
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script src="../../js/auth.js"></script>
</body>

</html>
